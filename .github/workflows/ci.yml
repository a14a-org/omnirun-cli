name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: node tests/cli.test.mjs

      - name: Package smoke check
        run: npm run pack:smoke

  ci-ok:
    runs-on: ubuntu-latest
    needs: test-build
    if: always()
    steps:
      - name: Verify matrix result
        run: |
          if [ "${{ needs.test-build.result }}" != "success" ]; then
            exit 1
          fi
